worker_processes 1;

events { worker_connections 1024; }

http {
    lua_shared_dict my_cache 10m;

    resolver 127.0.0.11 ipv6=off;

    init_worker_by_lua_file /etc/nginx/lua/worker_init.lua;

    server {
        listen 80;

        location / {
            root /usr/local/openresty/nginx/html;
            index index.html;
        }

        location /visit {
            content_by_lua_file /etc/nginx/lua/counter.lua;
        }

        location /events {
            content_by_lua_file /etc/nginx/lua/sse.lua;
            proxy_buffering off;
        }
    }
}
